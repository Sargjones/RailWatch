name: RailWatch — daily data scrape

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run core scraper
        run: python scraper/railwatch_scraper.py

      - name: Run YouTube scraper
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_VISION: "false"
        run: python scraper/railwatch_youtube.py 7

      - name: Commit and push data
        run: |
          git config user.name  "RailWatch Bot"
          git config user.email "bot@criticalto.ca"
          git add railwatch_data_latest.json \
                  railwatch_data_*.json \
                  railwatch_tdg.json \
                  railwatch_youtube_latest.json
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
