name: RailWatch Daily Scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run camera scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scraper/railwatch_cameras.py

      - name: Run YouTube scraper (RECOVERY — 90 days, clears dedup and rebuilds)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FACILITIES_PAT: ${{ secrets.FACILITIES_PAT }}
        run: python scraper/railwatch_youtube.py 90

      - name: Run correlation engine
        run: python scraper/railwatch_correlate.py

      - name: Commit updated data
        run: |
          git config user.name "RailWatch Bot"
          git config user.email "railwatch@criticalto.ca"
          git add -A
          git diff --cached --quiet || git commit -m "RailWatch RECOVERY run $(date -u +%Y-%m-%dT%H:%M:%SZ) — full 90-day re-scrape"
          git push
